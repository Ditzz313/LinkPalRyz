<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:sans-serif;
}

body{
  background:linear-gradient(135deg,#020617,#0f172a);
  color:white;
}

/* MENU BUTTON */
.menu-btn{
  position:fixed;
  top:15px;
  left:15px;
  font-size:25px;
  cursor:pointer;
  z-index:1001;
}

/* SIDEBAR */
.sidebar{
  position:fixed;
  left:-270px;
  top:0;
  width:270px;
  height:100%;
  background:#020617;
  padding:20px;
  transition:0.3s;
  z-index:1000;
  box-shadow:0 0 20px rgba(0,0,0,0.5);
}

.sidebar.active{
  left:0;
}

.close-btn{
  position:absolute;
  top:10px;
  right:15px;
  font-size:22px;
  cursor:pointer;
}

/* MENU TITLE */
.sidebar h2{
  margin-bottom:20px;
  color:#0ea5e9;
}

/* SOSMED DI MENU */
.menu-link{
  display:flex;
  align-items:center;
  gap:10px;
  background:#1f2937;
  padding:12px;
  margin:10px 0;
  border-radius:12px;
  text-decoration:none;
  color:white;
  transition:0.2s;
}

.menu-link:hover{
  background:#0ea5e9;
}

/* PROFILE */
.profile{
  text-align:center;
  margin-top:60px;
}

.profile img{
  width:100px;
  height:100px;
  border-radius:50%;
  border:3px solid #0ea5e9;
  box-shadow:0 0 15px #0ea5e9;
}

.profile h1{
  margin-top:10px;
}

/* TITLE */
.title{
  text-align:center;
  margin-top:20px;
  font-size:22px;
  color:#0ea5e9;
}

/* LINKS */
.links{
  padding:20px;
}

/* CARD LINK */
.link-btn{
  display:flex;
  align-items:center;
  justify-content:space-between;
  background:#1f2937;
  margin:15px 0;
  padding:15px;
  border-radius:15px;
  text-decoration:none;
  color:white;
  font-size:18px;
  transition:0.3s;
  box-shadow:0 0 10px rgba(0,0,0,0.3);
}

.link-btn:hover{
  transform:scale(1.05);
  background:#0ea5e9;
  box-shadow:0 0 20px #0ea5e9;
}

/* LEFT SIDE */
.left{
  display:flex;
  align-items:center;
  gap:12px;
}

/* NUMBER */
.number{
  background:#0ea5e9;
  width:32px;
  height:32px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:14px;
}

/* ICON WEB */
.web-icon{
  font-size:20px;
}

/* ANIMASI */
.link-btn{
  animation:fadeIn 0.5s ease;
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(20px);}
  to{opacity:1; transform:translateY(0);}
}
</style>
</head>
